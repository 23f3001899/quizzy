<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy - Your Ultimate Quiz App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg shadow-sm"
     style="background: linear-gradient(135deg, #6d28d9, #2563eb);">

    <div class="container">
        <a class="navbar-brand fw-bold text-white fs-3" href="/">
            <i class="fa-solid fa-graduation-cap me-2"></i>
            Quiz App
        </a>

        <div class="d-flex align-items-center gap-3">

            <div class="text-white fw-semibold">
                <i class="fa-solid fa-user-circle me-2"></i>
                Welcome, {{ session["user_name"] }}
            </div>

            <a href="/history" class="btn btn-outline-light px-4 rounded-4">
                <i class="fa-solid fa-chart-column me-2"></i>
                Previous Results
            </a>

            <a href="/logout" class="btn btn-danger px-4 rounded-4">
                <i class="fa-solid fa-power-off me-2"></i>
                Logout
            </a>

        </div>
    </div>
</nav>

<div class="container py-5">
    <div id="app-root"></div>
</div>

<script src="{{ url_for('static', filename='js/questions.js') }}?v=2"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}?v=2"></script>
<script src="{{ url_for('static', filename='js/timer.js') }}?v=2"></script>
<script src="{{ url_for('static', filename='js/quiz.js') }}?v=2"></script>

</body>
</html>
